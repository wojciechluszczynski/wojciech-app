<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wojciech Łuszczyński — Sign in</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<script>
  (function(){
    try {
      var saved = localStorage.getItem('theme');
      var mode = saved ? saved : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', mode);
      document.documentElement.style.colorScheme = mode;
    } catch(e) { document.documentElement.setAttribute('data-theme','light'); }
  })();
</script>
<style>
  :root {
    --bg:#F3F2EF; --bg1:#FFFFFF; --bg2:#F0EFEC;
    --lime:#EBFF00; --lime-dim:rgba(235,255,0,0.14); --lime-glow:rgba(235,255,0,0.25);
    --border:rgba(0,0,0,0.08); --border-hi:rgba(0,0,0,0.15);
    --text:#080808; --text-2:#555; --text-3:#888;
    --card-shadow: 0 8px 28px rgba(0,0,0,0.06);
    --radial-glow: transparent;
  }
  [data-theme="dark"] {
    --bg:#09090b; --bg1:#111113; --bg2:#1a1a1d;
    --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.15);
    --text:#f0f0f0; --text-2:#a0a0a8; --text-3:#666672;
    --card-shadow: 0 0 32px rgba(235,255,0,0.06);
    --radial-glow: radial-gradient(ellipse at 50% -10%, rgba(235,255,0,0.14) 0%, transparent 55%);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    background-image: var(--radial-glow);
    color: var(--text);
    font-family: 'Geist','Inter',system-ui,sans-serif;
    transition: background .2s, color .2s;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:20px 28px; }
  .icon-btn {
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 999px; border: none; background: none;
    color: var(--text-2); cursor: pointer;
    transition: color .15s, background .15s;
  }
  .icon-btn:hover { color: var(--text); background: var(--bg2); }
  [data-theme="dark"] .icon-btn { color: var(--lime); }

  .langtoggle {
    display: inline-flex; align-items: center; gap: 0;
    background: var(--bg1); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px;
  }
  .langbtn {
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 5px 11px; border-radius: 999px;
    background: none; border: none; color: var(--text-3); cursor: pointer;
    font-family: inherit; transition: all .15s;
  }
  .langbtn.active { background: var(--lime); color: #080808; }

  .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 24px; }

  .card {
    width: 100%; max-width: 380px;
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px 30px 28px;
    text-align: center;
    box-shadow: var(--card-shadow);
  }

  .avatar-wrap { display: flex; justify-content: center; margin-bottom: 16px; }
  .avatar {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 2px solid var(--lime);
    object-fit: cover;
    box-shadow: 0 0 22px var(--lime-glow);
  }
  .avatar-fallback {
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 2px solid var(--lime);
    background: linear-gradient(135deg, #2d4f7c 0%, #1a3050 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900; color: rgba(255,255,255,.85);
    letter-spacing: -1px;
    box-shadow: 0 0 22px var(--lime-glow);
  }

  .name {
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
    margin: 0 0 10px;
  }
  .badge {
    display: inline-block;
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
    padding: 5px 13px; border-radius: 999px;
    background: var(--lime); color: #080808;
    margin-bottom: 14px;
  }
  .tagline {
    font-size: 13px; line-height: 1.5;
    color: var(--text-2);
    margin: 0 0 18px;
    padding: 0 6px;
  }

  .socials {
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .soc {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500;
    padding: 6px 12px; border-radius: 999px;
    background: var(--bg2); color: var(--text-2);
    text-decoration: none;
    border: 1px solid var(--border);
    transition: all .15s;
  }
  .soc:hover { color: var(--text); border-color: var(--border-hi); }
  .soc svg { width: 11px; height: 11px; }

  .divider { height: 1px; background: var(--border); margin: 4px 0 18px; }

  .form { display: flex; flex-direction: column; gap: 8px; }
  .input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text);
    font-size: 13px; font-family: inherit;
    outline: none; text-align: center;
    transition: border-color .15s, box-shadow .15s;
  }
  .input::placeholder { color: var(--text-3); }
  .input:focus { border-color: var(--lime); box-shadow: 0 0 0 3px rgba(235,255,0,.14); }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--lime); color: #080808;
    font-size: 13px; font-weight: 800; letter-spacing: .2px;
    border: none; border-radius: 999px;
    cursor: pointer; font-family: inherit;
    transition: background .15s, transform .15s, opacity .15s;
  }
  .btn:hover:not(:disabled) { background: #d4e600; transform: translateY(-1px); }
  .btn:disabled { cursor: not-allowed; opacity: .6; }

  .err {
    min-height: 18px;
    font-size: 12px; color: #ef4444; font-weight: 600;
    text-align: center;
    opacity: 0; transition: opacity .2s;
  }
  .err.show { opacity: 1; }

  .footer { padding: 28px 24px 32px; text-align: center; }
  .trusted-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 2.5px;
    color: var(--text-3); margin: 0 0 8px;
  }
  .trusted-row {
    font-size: 11px; font-weight: 500;
    color: var(--text-2);
    margin: 0;
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  }
  .trusted-sep { color: var(--text-3); opacity: .5; }

  @media (max-width: 480px) {
    .card { padding: 26px 22px 24px; }
    .name { font-size: 20px; }
    .topbar { padding: 14px 16px; }
  }

  /* Theme toggle icon swap */
  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="dark"] .icon-sun { display: block; }
  [data-theme="dark"] .icon-moon { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <button class="icon-btn" id="themeBtn" aria-label="Toggle theme" type="button">
    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>
  <div class="langtoggle" role="group" aria-label="Language">
    <button class="langbtn" data-lang="pl" type="button">PL</button>
    <button class="langbtn active" data-lang="en" type="button">EN</button>
    <button class="langbtn" data-lang="it" type="button">IT</button>
  </div>
</div>

  function setLang(l) {

    b.addEventListener('click', function(){ setLang(b.getAttribute('data-lang')); });
  });
  var savedLang = (function(){ try{return localStorage.getItem('lang');}catch(e){return null;} })();
  if (savedLang && I18N[savedLang]) setLang(savedLang);

  // Login submit
  var form = document.getElementById('loginForm');
  var pwInput = document.getElementById('pw');
  var errEl = document.getElementById('err');
  var btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errEl.classList.remove('show');
    var password = (pwInput.value || '').trim();
    if (!password) { pwInput.focus(); return; }

    btn.disabled = true;
    var origBtnText = btn.textContent;
    btn.textContent = '…';

    try {
      var res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: password }),
        credentials: 'same-origin',
      });
      if (res.ok) {
        // Cookie is set. Reload to let middleware serve the real app.
        window.location.href = '/';
        return;
      }
      // 401 or any non-OK
      errEl.classList.add('show');
      pwInput.value = '';
      pwInput.focus();
    } catch (err) {
      errEl.textContent = 'Network error';
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = origBtnText;
    }
  });
</script>

</body>
</html>
